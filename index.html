  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />

</head>
<body data-page="landing">

  <header class="nav">
    <a href="index.html" class="nav__home is-active">main</a>
    <nav class="nav__links">
      <a href="projects.html">projects</a>

  <main class="landing">

    <div class="landing__left">
      <div class="landing__tags">
        <div class="landing__tag-row">
          <span class="landing__tag" data-letters="U,X">#UX</span>
          &nbsp;&nbsp;
          <span class="landing__tag" data-letters="H,C,I">#HCI</span>
        </div>
        <div class="landing__tag-row">
          <span class="landing__tag" data-letters="S,E,R">#Service</span>
          &nbsp;&nbsp;
          <span class="landing__tag" data-letters="R,S,C">#Research</span>
        </div>
        <div class="landing__tag-row">
          <span class="landing__tag" data-letters="H,C,R">#Healthcare</span>
          &nbsp;&nbsp;
          <span class="landing__tag" data-letters="P,R,D">#Product</span>
        </div>
        <div class="landing__tag-row">
          <span class="landing__tag" data-letters="H,U,M,N">#Human-Centered</span>
        </div>
      </div>
      <a href="contact.html" class="landing__contact">contact ↗</a>
    </div>

    <div class="landing__right">
      <div id="physics-stage"></div>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
  <script src="script.js"></script>
  <script>
  window.addEventListener('load', function () {
    var stage = document.getElementById('physics-stage');
    if (!stage || typeof Matter === 'undefined') return;

    var rect = stage.getBoundingClientRect();
    var W    = Math.max(Math.round(rect.width),  320);
    var H    = Math.max(Math.round(rect.height), 280);
    var UNIT = Math.min(W, H) / 6;

    var CANVAS_BG = '#2b4acb';
    var WHITE     = '#ffffff';

    var CHARS = ['2','0','2','6','D','E','S','I','G','N'];

    var Engine          = Matter.Engine;
    var Render          = Matter.Render;
    var Runner          = Matter.Runner;
    var Bodies          = Matter.Bodies;
    var Body            = Matter.Body;
    var Composite       = Matter.Composite;
    var Events          = Matter.Events;
    var Mouse           = Matter.Mouse;
    var MouseConstraint = Matter.MouseConstraint;

    var engine       = Engine.create();
    engine.gravity.y = 0.85;

    var render = Render.create({
      element: stage,
      engine:  engine,
      options: {
        width:      W,
        height:     H,
        wireframes: false,
        background: CANVAS_BG,
      }
    });

    render.canvas.style.width   = W + 'px';
    render.canvas.style.height  = H + 'px';
    render.canvas.style.display = 'block';

    /* invisible walls + floor */
    var wo    = { isStatic: true, render: { fillStyle: 'transparent' } };
    var floor = Bodies.rectangle(W/2,    H + 30,  W + 200, 60, wo);
    var wallL = Bodies.rectangle(-30,    H/2,     60, H*4,  wo);
    var wallR = Bodies.rectangle(W + 30, H/2,     60, H*4,  wo);

    /* per-glyph shaped hitboxes */
    var RAD = UNIT * 0.5;

    function makeLetterBody(ch, x, y, r) {
      var d = r * 2;
      var base = {
        restitution: 0.6,    /* bouncier */
        friction:    0.12,
        frictionAir: 0.008,
        label:       ch,
        render:      { fillStyle: CANVAS_BG }
      };
      if ('0SG6OUCQ'.indexOf(ch) !== -1) {
        return Bodies.circle(x, y, r, base);
      }
      if (ch === 'I') {
        return Bodies.rectangle(x, y, d * 0.28, d * 1.05,
          Object.assign({}, base, { chamfer: { radius: 5 } }));
      }
      if (ch === 'D') {
        return Bodies.rectangle(x, y, d * 0.95, d * 1.05,
          Object.assign({}, base, { chamfer: { radius: [6, r * 0.88, r * 0.88, 6] } }));
      }
      if (ch === 'E') {
        return Bodies.rectangle(x, y, d * 0.85, d * 1.05,
          Object.assign({}, base, { chamfer: { radius: 7 } }));
      }
      if (ch === 'N') {
        return Bodies.rectangle(x, y, d * 1.05, d * 1.05,
          Object.assign({}, base, { chamfer: { radius: 7 } }));
      }
      if (ch === '2') {
        return Bodies.rectangle(x, y, d * 0.85, d * 1.0,
          Object.assign({}, base, { chamfer: { radius: [r * 0.45, r * 0.45, 8, 8] } }));
      }
      return Bodies.rectangle(x, y, d * 0.9, d * 1.0,
        Object.assign({}, base, { chamfer: { radius: 8 } }));
    }

    function spawnLetters() {
      return CHARS.map(function(ch, i) {
        var x    = W * 0.1 + Math.random() * W * 0.8;
        var y    = -RAD * 2 - i * (RAD * 2.6 + Math.random() * 40) - Math.random() * 80;
        var body = makeLetterBody(ch, x, y, RAD);
        body._r    = RAD;
        body._text = WHITE;
        Body.setAngle(body,           (Math.random() - 0.5) * Math.PI * 2);
        Body.setVelocity(body,        { x: (Math.random() - 0.5) * 7, y: Math.random() * -3 });
        Body.setAngularVelocity(body, (Math.random() - 0.5) * 0.28);
        return body;
      });
    }

    var bodies = spawnLetters();
    Composite.add(engine.world, [floor, wallL, wallR].concat(bodies));

    /* ── drag & throw ── */
    var mouse = Mouse.create(render.canvas);
    var mc    = MouseConstraint.create(engine, {
      mouse:      mouse,
      constraint: { stiffness: 0.15, render: { visible: false } }
    });
    Composite.add(engine.world, mc);
    render.mouse = mouse;

    /* ── hover repulsion (skip grabbed body) ── */
    var mx = -999, my = -999;
    render.canvas.addEventListener('mousemove', function(e) {
      var r = render.canvas.getBoundingClientRect();
      mx = e.clientX - r.left;
      my = e.clientY - r.top;
    });
    render.canvas.addEventListener('mouseleave', function() { mx = -999; my = -999; });

    var REPEL = 175;
    Events.on(engine, 'beforeUpdate', function() {
      bodies.forEach(function(b) {
        if (b === mc.body) return;
        var dx = b.position.x - mx;
        var dy = b.position.y - my;
        var d2 = dx*dx + dy*dy;
        if (d2 < REPEL*REPEL && d2 > 1) {
          var d   = Math.sqrt(d2);
          var str = ((REPEL - d) / REPEL) * 0.018;
          Body.applyForce(b, b.position, { x: (dx/d)*str, y: (dy/d)*str });
        }
      });
    });

    /* ── click to blast ── */
    render.canvas.addEventListener('click', function(e) {
      if (mc.body) return;
      var r  = render.canvas.getBoundingClientRect();
      var cx = e.clientX - r.left;
      var cy = e.clientY - r.top;
      bodies.forEach(function(b) {
        var dx  = b.position.x - cx;
        var dy  = b.position.y - cy;
        var d   = Math.sqrt(dx*dx + dy*dy) || 1;
        var str = Math.max(0, (380 - d) / 380) * 0.036;
        Body.applyForce(b, b.position, { x: (dx/d)*str, y: (dy/d)*str });
        Body.setAngularVelocity(b, b.angularVelocity + (Math.random()-0.5)*0.4);
      });
    });

    /* ── double-click to reset (re-drop all) ── */
    render.canvas.addEventListener('dblclick', function() {
      bodies.forEach(function(b, i) {
        var x = W * 0.1 + Math.random() * W * 0.8;
        var y = -RAD * 2 - i * (RAD * 2.6 + Math.random() * 40) - Math.random() * 80;
        Body.setPosition(b,        { x: x, y: y });
        Body.setVelocity(b,        { x: (Math.random()-0.5)*7, y: Math.random()*-3 });
        Body.setAngle(b,           (Math.random()-0.5)*Math.PI*2);
        Body.setAngularVelocity(b, (Math.random()-0.5)*0.28);
      });
    });

    /* ── render: letters + velocity tint + hint ── */
    Events.on(render, 'afterRender', function() {
      var ctx = render.context;

      bodies.forEach(function(body) {
        /* speed-based tint: white at rest → warm yellow when fast */
        var spd = Math.sqrt(body.velocity.x*body.velocity.x + body.velocity.y*body.velocity.y);
        var t   = Math.min(spd / 14, 1);
        var col = 'rgb(255,' + Math.round(255-t*55) + ',' + Math.round(255-t*130) + ')';

        ctx.save();
        ctx.translate(body.position.x, body.position.y);
        ctx.rotate(body.angle);

        var fs = body._r * 1.55;
        ctx.fillStyle    = col;
        ctx.font         = '400 ' + fs + 'px "DM Serif Display",Georgia,serif';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(body.label, 0, fs * 0.07);

        ctx.restore();
      });

    });

    /* ── tag clicks: drop correlated letters ── */
    document.querySelectorAll('.landing__tag[data-letters]').forEach(function(el) {
      el.addEventListener('click', function() {
        /* pop animation feedback */
        el.classList.add('is-dropping');
        setTimeout(function() { el.classList.remove('is-dropping'); }, 320);

        var chars = el.dataset.letters.split(',');
        chars.forEach(function(ch, i) {
          var bx   = W * 0.15 + Math.random() * W * 0.7;
          var by   = -RAD * 1.5 - i * (RAD * 2.4 + Math.random() * 30);
          var body = makeLetterBody(ch.trim(), bx, by, RAD);
          body._r    = RAD;
          body._text = WHITE;
          Body.setAngle(body,           (Math.random()-0.5) * Math.PI * 2);
          Body.setVelocity(body,        { x: (Math.random()-0.5)*6, y: Math.random()*-2 });
          Body.setAngularVelocity(body, (Math.random()-0.5) * 0.28);
          Composite.add(engine.world, body);
          bodies.push(body); /* joins repulsion + tint system */
        });
      });
    });

    Render.run(render);
    Runner.run(Runner.create(), engine);
  });
  </script>
</body>
</html>
