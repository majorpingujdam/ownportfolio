<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Owen Chen</title>
  <meta name="description" content="Owen Chen — UX & HCI design student." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="landing">

  <header class="nav">
    <nav class="nav__links">
      <a href="projects.html">projects</a>
      <a href="bio.html">bio</a>
      <a href="resume.html">resume</a>
    </nav>
  </header>

  <main class="landing">

    <div class="landing__left">
      <p class="landing__name">Owen Chen</p>

      <div class="landing__tags">
        <div class="landing__tag-row">#UX &nbsp;&nbsp; #HCI</div>
        <div class="landing__tag-row">#Service &nbsp;&nbsp; #Research</div>
        <div class="landing__tag-row">#Healthcare &nbsp;&nbsp; #Product</div>
        <div class="landing__tag-row">#Human-Centered</div>
      </div>
    </div>

    <!-- Physics canvas panel -->
    <div class="landing__right">
      <div id="physics-stage"></div>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
  <script src="script.js"></script>
  <script>
  (function () {
    const stage = document.getElementById('physics-stage');
    if (!stage || typeof Matter === 'undefined') return;

    const INK  = '#1a1a1a';
    const RED  = '#d8451d';
    const BLUE = '#5a7af0';
    const BG   = '#f0ede6';

    const BLOCKS = [
      { t: '2',      c: INK  },
      { t: '0',      c: INK  },
      { t: '2',      c: RED  },
      { t: '6',      c: RED  },
      { t: 'UX',     c: BLUE },
      { t: 'HCI',    c: INK  },
      { t: 'SERVICE',c: INK  },
      { t: 'DESIGN', c: INK  },
    ];

    const { Engine, Render, Runner, Bodies, Body, Composite, Events } = Matter;

    function init() {
      const W = stage.clientWidth  || 380;
      const H = stage.clientHeight || 340;
      const DPR = Math.min(window.devicePixelRatio || 1, 2);
      const UNIT = Math.min(W / 7, H / 6, 46);

      const engine = Engine.create();
      engine.gravity.y = 1.2;

      const render = Render.create({
        element: stage,
        engine,
        options: {
          width: W, height: H,
          pixelRatio: DPR,
          wireframes: false,
          background: BG,
        }
      });

      // walls
      const wo = { isStatic: true, render: { fillStyle: 'transparent' } };
      const floor = Bodies.rectangle(W/2, H+30, W+200, 60, wo);
      const wallL = Bodies.rectangle(-30, H/2, 60, H*4, wo);
      const wallR = Bodies.rectangle(W+30, H/2, 60, H*4, wo);
      const ceil  = Bodies.rectangle(W/2, -30, W+200, 60, wo);

      // letter bodies
      const bodies = BLOCKS.map((b, i) => {
        const cLen = b.t.length;
        const bW = UNIT * (0.85 + cLen * 0.22);
        const bH = UNIT * 0.85;
        const x = W * 0.1 + Math.random() * W * 0.8;
        const y = -UNIT * 1.5 - (i * UNIT * 0.55) - Math.random() * UNIT;
        const body = Bodies.rectangle(x, y, bW, bH, {
          restitution: 0.3,
          friction: 0.45,
          frictionAir: 0.018,
          label: b.t,
          render: { fillStyle: b.c },
        });
        body.__w = bW;
        body.__h = bH;
        body.__c = b.c;
        return body;
      });

      Composite.add(engine.world, [floor, wallL, wallR, ceil, ...bodies]);

      // ── hover repulsion (no drag, pure force) ─────────────────
      let mx = -999, my = -999;
      render.canvas.addEventListener('mousemove', e => {
        const r = render.canvas.getBoundingClientRect();
        mx = (e.clientX - r.left) * (W / r.width);
        my = (e.clientY - r.top)  * (H / r.height);
      });
      render.canvas.addEventListener('mouseleave', () => { mx = -999; my = -999; });

      const REPEL_R = 90;
      Events.on(engine, 'beforeUpdate', () => {
        bodies.forEach(body => {
          const dx = body.position.x - mx;
          const dy = body.position.y - my;
          const distSq = dx*dx + dy*dy;
          if (distSq < REPEL_R * REPEL_R && distSq > 1) {
            const dist = Math.sqrt(distSq);
            const str  = ((REPEL_R - dist) / REPEL_R) * 0.007;
            Body.applyForce(body, body.position, {
              x: (dx / dist) * str,
              y: (dy / dist) * str,
            });
          }
        });
      });

      // ── custom render ─────────────────────────────────────────
      Events.on(render, 'afterRender', () => {
        const ctx = render.context;
        const r = 9;
        bodies.forEach(body => {
          const { x, y } = body.position;
          const a = body.angle;
          const bW = body.__w, bH = body.__h;

          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(a);

          ctx.beginPath();
          const x0 = -bW/2, y0 = -bH/2;
          ctx.moveTo(x0+r, y0);
          ctx.lineTo(x0+bW-r, y0);
          ctx.quadraticCurveTo(x0+bW, y0, x0+bW, y0+r);
          ctx.lineTo(x0+bW, y0+bH-r);
          ctx.quadraticCurveTo(x0+bW, y0+bH, x0+bW-r, y0+bH);
          ctx.lineTo(x0+r, y0+bH);
          ctx.quadraticCurveTo(x0, y0+bH, x0, y0+bH-r);
          ctx.lineTo(x0, y0+r);
          ctx.quadraticCurveTo(x0, y0, x0+r, y0);
          ctx.closePath();
          ctx.fillStyle = body.__c;
          ctx.fill();

          const fs = bH * 0.38;
          ctx.fillStyle = '#fff';
          ctx.font = `600 ${fs}px Inter,-apple-system,sans-serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(body.label, 0, 1);
          ctx.restore();
        });
      });

      Render.run(render);
      Runner.run(Runner.create(), engine);

      // resize
      new ResizeObserver(() => {
        const nW = stage.clientWidth, nH = stage.clientHeight;
        render.canvas.width  = nW * DPR;
        render.canvas.height = nH * DPR;
        render.canvas.style.width  = nW + 'px';
        render.canvas.style.height = nH + 'px';
        render.options.width = nW;
        render.options.height = nH;
        Body.setPosition(floor, { x: nW/2, y: nH+30 });
        Body.setPosition(wallR, { x: nW+30, y: nH/2 });
      }).observe(stage);
    }

    requestAnimationFrame(init);
  })();
  </script>
</body>
</html>
