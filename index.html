<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Owen Chen</title>
  <meta name="description" content="Owen Chen — UX & HCI design student." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="landing">

  <header class="nav">
    <nav class="nav__links">
      <a href="projects.html">projects</a>
      <a href="bio.html">bio</a>
      <a href="resume.html">resume</a>
    </nav>
  </header>

  <main class="landing">

    <div class="landing__left">
      <p class="landing__name">Owen Chen</p>
      <div class="landing__tags">
        <div class="landing__tag-row">#UX &nbsp;&nbsp; #HCI</div>
        <div class="landing__tag-row">#Service &nbsp;&nbsp; #Research</div>
        <div class="landing__tag-row">#Healthcare &nbsp;&nbsp; #Product</div>
        <div class="landing__tag-row">#Human-Centered</div>
      </div>
    </div>

    <div class="landing__right">
      <div id="physics-stage"></div>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
  <script src="script.js"></script>
  <script>
  window.addEventListener('load', function () {
    var stage = document.getElementById('physics-stage');
    if (!stage || typeof Matter === 'undefined') return;

    var INK  = '#1a1a1a';
    var RED  = '#d8451d';
    var BLUE = '#5a7af0';
    var BG   = '#edeae2';

    var BLOCKS = [
      { t: '2',       c: INK  },
      { t: '0',       c: INK  },
      { t: '2',       c: RED  },
      { t: '6',       c: RED  },
      { t: 'UX',      c: BLUE },
      { t: 'HCI',     c: INK  },
      { t: 'SERVICE', c: INK  },
      { t: 'DESIGN',  c: INK  },
    ];

    var W = 360, H = 320;   /* fixed canvas size — matches CSS */
    var UNIT = 44;

    var Engine = Matter.Engine,
        Render = Matter.Render,
        Runner = Matter.Runner,
        Bodies = Matter.Bodies,
        Body   = Matter.Body,
        Composite = Matter.Composite,
        Events = Matter.Events;

    var engine = Engine.create();
    engine.gravity.y = 1.2;

    var render = Render.create({
      element: stage,
      engine: engine,
      options: {
        width: W, height: H,
        wireframes: false,
        background: BG,
      }
    });

    /* size the canvas explicitly in CSS so it matches the container */
    render.canvas.style.width  = W + 'px';
    render.canvas.style.height = H + 'px';
    render.canvas.style.display = 'block';

    /* invisible walls */
    var wo = { isStatic: true, render: { fillStyle: 'transparent' } };
    var floor = Bodies.rectangle(W/2, H + 30, W + 200, 60, wo);
    var wallL = Bodies.rectangle(-30,  H/2,   60, H*4,  wo);
    var wallR = Bodies.rectangle(W+30, H/2,   60, H*4,  wo);

    /* letter bodies — stagger drop positions */
    var bodies = BLOCKS.map(function(b, i) {
      var cLen = b.t.length;
      var bW = UNIT * (0.9 + cLen * 0.2);
      var bH = UNIT * 0.82;
      var cols = 4;
      var col = i % cols;
      var row = Math.floor(i / cols);
      var x = W * 0.12 + col * (W * 0.22) + (Math.random() - 0.5) * 20;
      var y = -bH * 1.5 - row * (bH + 10) - Math.random() * 30;

      var body = Bodies.rectangle(x, y, bW, bH, {
        restitution: 0.28,
        friction:    0.45,
        frictionAir: 0.016,
        label: b.t,
        render: { fillStyle: b.c }
      });
      body._w = bW;
      body._h = bH;
      body._c = b.c;
      return body;
    });

    Composite.add(engine.world, [floor, wallL, wallR].concat(bodies));

    /* hover repulsion — no drag needed */
    var mx = -999, my = -999;
    render.canvas.addEventListener('mousemove', function(e) {
      var r = render.canvas.getBoundingClientRect();
      mx = e.clientX - r.left;
      my = e.clientY - r.top;
    });
    render.canvas.addEventListener('mouseleave', function() { mx = -999; my = -999; });

    var REPEL = 85;
    Events.on(engine, 'beforeUpdate', function() {
      bodies.forEach(function(b) {
        var dx = b.position.x - mx;
        var dy = b.position.y - my;
        var d2 = dx*dx + dy*dy;
        if (d2 < REPEL*REPEL && d2 > 1) {
          var d  = Math.sqrt(d2);
          var str = ((REPEL - d) / REPEL) * 0.006;
          Body.applyForce(b, b.position, { x: (dx/d)*str, y: (dy/d)*str });
        }
      });
    });

    /* custom render — rounded blocks + white labels */
    Events.on(render, 'afterRender', function() {
      var ctx = render.context;
      var r = 8;
      bodies.forEach(function(body) {
        var x = body.position.x, y = body.position.y;
        var a = body.angle;
        var bW = body._w, bH = body._h;

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(a);

        var x0 = -bW/2, y0 = -bH/2;
        ctx.beginPath();
        ctx.moveTo(x0+r, y0);
        ctx.lineTo(x0+bW-r, y0);
        ctx.quadraticCurveTo(x0+bW, y0, x0+bW, y0+r);
        ctx.lineTo(x0+bW, y0+bH-r);
        ctx.quadraticCurveTo(x0+bW, y0+bH, x0+bW-r, y0+bH);
        ctx.lineTo(x0+r, y0+bH);
        ctx.quadraticCurveTo(x0, y0+bH, x0, y0+bH-r);
        ctx.lineTo(x0, y0+r);
        ctx.quadraticCurveTo(x0, y0, x0+r, y0);
        ctx.closePath();
        ctx.fillStyle = body._c;
        ctx.fill();

        var fs = bH * 0.38;
        ctx.fillStyle = '#ffffff';
        ctx.font = '600 ' + fs + 'px Inter,-apple-system,sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(body.label, 0, 1);
        ctx.restore();
      });
    });

    Render.run(render);
    Runner.run(Runner.create(), engine);
  });
  </script>
</body>
</html>
